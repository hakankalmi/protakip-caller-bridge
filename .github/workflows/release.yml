name: Build & Deploy Bridge

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish (win-x64, single-file self-contained)
        run: dotnet publish ProTakipCallerBridge.csproj -c Release -o publish

      - name: Upload exe to Hetzner (api.protakip.com/downloads/)
        shell: pwsh
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          $keyPath = Join-Path $env:RUNNER_TEMP "hetzner_id_ed25519"
          $env:HETZNER_SSH_KEY | Out-File -FilePath $keyPath -Encoding ascii
          icacls $keyPath /inheritance:r /grant:r "$env:USERNAME:(R)" | Out-Null
          scp -o StrictHostKeyChecking=no -i $keyPath publish/ProTakipCallerBridge.exe root@37.27.203.254:/var/www/html/downloads/ProTakipCallerBridge.exe

      - name: Artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: ProTakipCallerBridge
          path: publish/ProTakipCallerBridge.exe
