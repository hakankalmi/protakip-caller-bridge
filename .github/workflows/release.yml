name: Build & Deploy Bridge

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Compute version (1.0.0.<run_number>)
        id: ver
        shell: pwsh
        run: |
          $version = "1.0.0.$env:GITHUB_RUN_NUMBER"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Bridge version: $version"

      - name: Publish (win-x64, single-file self-contained, DLLs side-by-side)
        shell: pwsh
        run: |
          dotnet publish ProTakipCallerBridge.csproj `
            -c Release `
            -o publish `
            -p:Version=${{ steps.ver.outputs.version }} `
            -p:AssemblyVersion=${{ steps.ver.outputs.version }} `
            -p:FileVersion=${{ steps.ver.outputs.version }} `
            -p:InformationalVersion=${{ steps.ver.outputs.version }}

      - name: Zip bundle (exe + cidshow_x64 + cidshow_x86)
        shell: pwsh
        run: |
          # Trim runtime artifacts we don't want shipped. cid.dll'ler
          # publish klasöründe zaten var (IncludeAllContentForSelfExtract
          # false, side-by-side). .pdb ve .xml belgelerini bırakıp
          # geri kalan her şeyi ZIP'e al.
          Get-ChildItem publish -Filter *.pdb -Recurse | Remove-Item -Force
          Compress-Archive -Path publish\* -DestinationPath ProTakipCallerBridge.zip -Force
          Get-Item ProTakipCallerBridge.zip | Format-List Length

      - name: Build vendor-test (.NET Framework 4.8, vendor Form1.cs birebir)
        shell: pwsh
        run: |
          # Isolated diagnostic build: vendor sample kodu olduğu gibi,
          # .NET Framework 4.8 target. Eğer bu exe de aramaları
          # yakalamazsa DLL cihazın CallerID event'ini vermiyor demektir
          # (bizim .NET 8 kodumuzda değil, SDK'nın kendisinde sorun var).
          dotnet build vendor-test/VendorTest.csproj -c Release -o vendor-test-publish
          Compress-Archive -Path vendor-test-publish\VendorTest.exe,vendor-test-publish\cidshow_x64,vendor-test-publish\cidshow_x86 -DestinationPath VendorTest.zip -Force
          Get-Item VendorTest.zip | Format-List Length

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bridge-zip
          path: |
            ProTakipCallerBridge.zip
            VendorTest.zip
          retention-days: 30

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: bridge-zip
          path: .

      - name: SCP zips to Hetzner
        uses: appleboy/scp-action@v0.1.7
        timeout-minutes: 3
        with:
          host: 37.27.203.254
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          source: "ProTakipCallerBridge.zip,VendorTest.zip"
          target: /var/www/html/downloads/
          timeout: 30s
          command_timeout: 60s
