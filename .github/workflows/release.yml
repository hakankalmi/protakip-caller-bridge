name: Build & Deploy Bridge

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish (win-x64, single-file self-contained)
        run: dotnet publish ProTakipCallerBridge.csproj -c Release -o publish

      - name: Upload exe to Hetzner (api.protakip.com/downloads/)
        # Battle-tested action — PowerShell'in kendi SSH key/encoding
        # wrapping'inde UTF-16 BOM, icacls parse bug'ı, multi-line PEM
        # handling gibi 5 ayrı sorunu birden çözüyor. İçeride native
        # openssh-client + ssh-keygen çalıştırdığı için key format
        # ("invalid format") da sorun olmuyor.
        uses: appleboy/scp-action@v0.1.7
        timeout-minutes: 3
        with:
          host: 37.27.203.254
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          source: publish/ProTakipCallerBridge.exe
          target: /var/www/html/downloads/
          strip_components: 1
          timeout: 30s
          command_timeout: 60s

      - name: Artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: ProTakipCallerBridge
          path: publish/ProTakipCallerBridge.exe
