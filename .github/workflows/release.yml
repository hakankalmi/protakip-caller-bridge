name: Build & Release Bridge

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish (win-x64, self-contained)
        run: dotnet publish ProTakipCallerBridge.csproj -c Release -o publish

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath ProTakipCallerBridge.zip -Force

      - name: Upload artifact (for manual dispatch runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ProTakipCallerBridge
          path: ProTakipCallerBridge.zip

      - name: GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ProTakipCallerBridge.zip
          generate_release_notes: true
