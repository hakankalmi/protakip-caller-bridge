name: Build & Deploy Bridge

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish (win-x64, single-file self-contained)
        run: dotnet publish ProTakipCallerBridge.csproj -c Release -o publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-exe
          path: publish/ProTakipCallerBridge.exe
          retention-days: 7

  deploy:
    # appleboy/scp-action bir Docker container action — sadece Linux
    # runner'da koşar. Windows build job'ından artifact alıp Linux'a
    # geçiyoruz, native openssh-client ile SCP yapıyor.
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: bridge-exe
          path: publish

      - name: SCP exe to Hetzner
        uses: appleboy/scp-action@v0.1.7
        timeout-minutes: 3
        with:
          host: 37.27.203.254
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          source: publish/ProTakipCallerBridge.exe
          target: /var/www/html/downloads/
          strip_components: 1
          timeout: 30s
          command_timeout: 60s
